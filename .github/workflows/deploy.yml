name: Deploy to ASUSTOR NAS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        # 최신 Tailwind는 Node 20 버전 이상에서 가장 잘 돌아갑니다.
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # --force를 붙여서 깨진 부품(Native binding)을 강제로 다시 설치하게 합니다.
        run: |
          npm install --force
          npm install @tailwindcss/oxide-linux-x64-gnu

      - name: Build project
        run: npm run build

      - name: Deploy to NAS via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USERNAME }}
          password: ${{ secrets.NAS_PASSWORD }}
          port: ${{ secrets.NAS_PORT }}
          source: "dist/*"
          target: "/volume1/Web/isaiah"
          strip_components: 1
          overwrite: true
